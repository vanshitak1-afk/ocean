<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lighthouse Story</title>
<style>
body{
  margin:0;
  font-family:'Comic Sans MS', cursive, sans-serif;
  background:#f7f0df;
  overflow-x:hidden;
}
.section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
  text-align:center;
}
.crayon{
  border:4px solid #333;
  border-radius:25px;
  background:#fffdf7;
  box-shadow:8px 8px 0 #333;
  padding:20px;
  max-width:900px;
}
h1,h2{transform:rotate(-1deg);}
#ocean{
  background:linear-gradient(#8fd3ff,#dff6ff);
}
#subway{
  background:repeating-linear-gradient(45deg,#ddd,#ddd 20px,#cfcfcf 20px,#cfcfcf 40px);
}
#tunnel{
  background:linear-gradient(#222,#444);
  color:white;
}
.wave{
  position:fixed;
  bottom:0;
  width:100%;
  height:120px;
  background:rgba(100,180,255,.5);
  clip-path:polygon(0 70%,10% 50%,20% 70%,30% 40%,40% 70%,50% 45%,60% 70%,70% 40%,80% 70%,90% 50%,100% 70%,100% 100%,0 100%);
  pointer-events:none;
}
button{
  font-size:1.1rem;
  padding:12px 20px;
  border-radius:20px;
  cursor:pointer;
}
#thought{
  font-size:1.2rem;
  margin-top:15px;
}
</style>
</head>
<body>

<div class="section" id="ocean">
  <div class="crayon">
    <h1>🖍️ The Lighthouse Story</h1>
    <p>Scroll through the protagonist's journey from suffocation to freedom.</p>
    <button onclick="playOcean()">Hear The Ocean</button>
    <p id="thought"></p>
  </div>
</div>

<div class="section" id="subway">
  <div class="crayon">
    <h2>The Subway</h2>
    <p>Move your mouse around. The crowd gets louder as you move.</p>
    <p>The character feels trapped, pushed, and carried by life.</p>
  </div>
</div>

<div class="section" id="tunnel">
  <div class="crayon">
    <h2>The Tunnel</h2>
    <p>Click repeatedly to run toward the waves.</p>
    <button onclick="run()">Run</button>
    <p id="distance">Distance: 0 m</p>
    <p id="ending"></p>
  </div>
</div>

<div class="wave"></div>

<script>
const thoughts=[
"Time never stops...",
"I just want to breathe.",
"The ocean feels real.",
"Maybe freedom exists.",
"The waves are calling."
];

function playOcean(){
  document.getElementById('thought').innerText =
    thoughts[Math.floor(Math.random()*thoughts.length)];
}

document.addEventListener("mousemove",(e)=>{
  const volume=(e.clientX/window.innerWidth)*100;
  document.title="Crowd Noise: "+Math.floor(volume)+"%";
});

let d=0;
function run(){
  d+=100;
  document.getElementById("distance").innerText="Distance: "+d+" m";
  if(d>=1000){
    document.getElementById("ending").innerHTML=
    "<h3>🌊 You hear the waves. The lighthouse appears in the distance.</h3>";
  }
}
</script>

</body>
</html>
